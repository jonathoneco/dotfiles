# Stable TLP profile for ThinkPad P1 Gen 8 (hybrid Intel + NVIDIA).
# Source: dotfiles/share/tlp/ — bootstrap copies to /etc/tlp.d/ (not stowed).
#
# Rules:
# - Set BOTH _ON_AC and _ON_BAT for every paired knob. TLP does not clear a
#   battery value when you plug in unless the AC counterpart is explicit.
# - tlp-rdw switches profiles automatically; no manual "tlp start" after plug/unplug.
# - NVIDIA stays on the runtime-PM denylist (hybrid resume stability).

TLP_ENABLE=1

# --- CPU ---
# AC: powersave governor + balanced platform — scales up under load, idles cool.
# Keep this conservative until lid suspend is stable again.
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

CPU_BOOST_ON_AC=1
CPU_BOOST_ON_BAT=0

CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

CPU_MAX_PERF_ON_AC=100
CPU_MIN_PERF_ON_AC=8
CPU_MAX_PERF_ON_BAT=70
CPU_MIN_PERF_ON_BAT=8

PLATFORM_PROFILE_ON_AC=balanced
PLATFORM_PROFILE_ON_BAT=balanced

# --- Power-saver (manual: `tlp-profile saver` / `sudo tlp power-saver`) ---
# Third profile for flights/long unplugged stretches. Does not replace _ON_BAT;
# toggle back with `tlp-profile daily` / `sudo tlp start`.
CPU_ENERGY_PERF_POLICY_ON_SAV=power
CPU_MAX_PERF_ON_SAV=50
CPU_MIN_PERF_ON_SAV=5
CPU_BOOST_ON_SAV=0
PLATFORM_PROFILE_ON_SAV=low-power
PCIE_ASPM_ON_SAV=powersave

# --- PCIe & storage ---
PCIE_ASPM_ON_AC=default
PCIE_ASPM_ON_BAT=powersave

RUNTIME_PM_ON_AC=on
RUNTIME_PM_ON_BAT=auto
RUNTIME_PM_DRIVER_DENYLIST="amdgpu mei_me nouveau nvidia xhci_hcd"

NVME_APST_ON_AC=1
NVME_APST_ON_BAT=1

# --- USB (autosuspend causes input lag on some devices) ---
USB_AUTOSUSPEND=0
USB_EXCLUDE_BTUSB=1

# --- Radio / audio ---
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on
WOL_DISABLE=Y
DEVICES_TO_DISABLE_ON_BAT=""
DEVICES_TO_DISABLE_ON_BAT_NOT_IN_USE=""

SOUND_POWER_SAVE_ON_AC=0
SOUND_POWER_SAVE_ON_BAT=1
