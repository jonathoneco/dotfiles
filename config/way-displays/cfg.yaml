# way-displays configuration
# Changes are applied immediately when saved.

# Arrange monitors left-to-right, aligned at top edge.
ARRANGE: ROW
ALIGN: TOP

# Monitor order by location. Laptop (eDP) is leftmost.
#
# Home: two Acer G257HU 1440p monitors.
# Office: landscape Lenovo left, vertical Lenovo right.
# Travel: laptop left, external LG to its right (LG listed after eDP).
ORDER:
  - "!^eDP"
  - "Acer Technologies G257HU T1WAA0012432"
  - "Acer Technologies G257HU T1WAA0012411"
  - "Lenovo Group Limited P24h-30 V90CDAYF"
  - "Lenovo Group Limited P24h-30 V90CDB32"
  - "!LG IPS FULLHD"

# Vertical monitor rotation.
TRANSFORM:
  - NAME_DESC: "Lenovo Group Limited P24h-30 V90CDB32"
    TRANSFORM: 270
  - NAME_DESC: "Hewlett Packard HP 27xi 3CM53306ZX"
    TRANSFORM: 270

# Pin Lenovo office monitors to native 1440p resolution.
MODE:
  - NAME_DESC: "Lenovo Group Limited P24h-30 V90CDAYF"
    WIDTH: 2560
    HEIGHT: 1440
  - NAME_DESC: "Lenovo Group Limited P24h-30 V90CDB32"
    WIDTH: 2560
    HEIGHT: 1440

# Scaling: explicit SCALE entries only (auto-scale was overriding 1.5 → ~2.875).
AUTO_SCALE: FALSE
# Acer G257HU 1440p — no scaling needed at 118 DPI.
SCALE:
  - NAME_DESC: "!G257HU"
    SCALE: 1
  # Laptop 3840x2400 panel.
  - NAME_DESC: "!^eDP"
    SCALE: 1.75
  - NAME_DESC: "Hewlett Packard HP 27xi 3CM53306ZX"
    SCALE: 0.8

# Keep ALL outputs on a plain fixed-refresh path. VRR toggles are a known
# trigger for the i915 Cx0/C10 eDP PHY wedge (drm/i915 #16042): enabling VRR on
# an external (e.g. DP-9) drives a modeset that wedges the shared pipe A / eDP-1
# and freezes the session (crash 2026-07-07 via mod+shift+c re-applying VRR).
# eDP-only VRR_OFF was insufficient — externals still got VRR enabled. Match all.
VRR_OFF:
  - "!."

LOG_THRESHOLD: INFO
