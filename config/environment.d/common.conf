XDG_CONFIG_HOME=${HOME}/.config
DOTFILES=${HOME}/src/dotfiles
GARDEN_LOG_DIR=${HOME}/src/garden-log
PATH=${HOME}/.local/share/mise/shims:${HOME}/.local/bin:${PATH}
XDG_CURRENT_DESKTOP=sway
MOZ_ENABLE_WAYLAND=1
# Hybrid GPU (P1 Gen 8): compositing on Intel iGPU (renderD129), not NVIDIA.
# GPU-accelerated Electron/Chromium is lower power than software (CPU) rendering.
DRI_PRIME=0
__NV_PRIME_RENDER_OFFLOAD=0
