#------------------------------------------------------------------------------
#------------------------------------------------------------------------------

# Unset default prefix
unbind C-b
unbind C-a

# Set Prefix to Ctrl+a
set-option -g prefix C-space
bind-key C-space send-prefix

# Split panes using \ and - (\ because it doesn't require shift)
# Start in same directory when splitting windows
bind '\' split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# When creating a window, start at the same path
# bind c new-window -c '#{pane_current_path}'

bind-key v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'tmux-yank'

# # Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display 'Reloaded tmux config'

#------------------------------------------------------------------------------
# Tmux Nagivator
#------------------------------------------------------------------------------

# vim-like pane switching
bind -r C-k select-pane -U
bind -r C-j select-pane -D
bind -r C-h select-pane -L
bind -r C-l select-pane -R

# Switch Pane positions
bind -n M-[ swap-pane -D
bind -n M-] swap-pane -U

# Shift window position in the window order (clamped at edges)
bind N if-shell '[ #{window_index} -lt $(tmux list-windows -F "##{window_index}" | tail -1) ]' 'swap-window -t +1 ; next-window'
bind P if-shell '[ #{window_index} -gt $(tmux list-windows -F "##{window_index}" | head -1) ]' 'swap-window -t -1 ; previous-window'

# Unbind Alt+j/k to allow zsh history navigation
unbind -n M-h
unbind -n M-j
unbind -n M-k
unbind -n M-l

#------------------------------------------------------------------------------
# Popup keymaps
#------------------------------------------------------------------------------

# All popups use tmux-popup so prefix+d inside detaches → promotes to a new window.
bind-key g run-shell -b 'tmux-popup lazygit -ucd ~/.config/lazygit/' # Lazygit
bind-key D run-shell -b 'tmux-popup lazydocker' # Lazydocker
bind-key e run-shell -b 'tmux-popup ranger' # Ranger
bind-key w run-shell -b 'tmux-popup -d ~ "$SHELL"' # Scratch shell
bind-key H run-shell -b 'tmux-popup btop' # btop

# bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/personal/dev/todo.md"

bind-key C-f display-popup -E -w 90% -h 90% 'agent-dashboard' # Agent dashboard (no promote)

# URL + file path picker (replaces tmux-fzf-url plugin)
bind-key u run-shell -b 'tmux-open'

bind-key C-s run-shell "tmux neww tmux-sessionizer"
bind-key M-j run-shell "tmux neww tmux-sessionizer -s 0"
bind-key M-k run-shell "tmux neww tmux-sessionizer -s 1"
bind-key M-l run-shell "tmux neww tmux-sessionizer -s 2"
# bind-key -r M-s run-shell "tmux split-window -h ascii-video-player ~/personal/dev/subway_surfer/frames"
