# Herdr configuration — tmux migration
#
# Herdr manages project work as workspaces containing tabs and panes.  It has
# no programmable tmux status line or window reordering, so those behaviours
# deliberately remain exclusive to the tmux configuration.

onboarding = false

[theme]
# config/tmux/config/plugins.conf uses Rose Pine's main variant.
name = "rose-pine"

[terminal]
default_shell = "zsh"
new_cwd = "follow"

[keys]
# Keep the active tmux prefix, Ctrl-Space (not the stale Ctrl-A comment).
prefix = "ctrl+space"

# Windows become Herdr tabs; pane and copy-mode bindings retain the tmux map.
new_tab = "prefix+c"
new_workspace = "prefix+ctrl+c"
rename_tab = "prefix+shift+r"
rename_workspace = "prefix+ctrl+r"
copy_mode = "prefix+v"
split_vertical = "prefix+backslash"
split_horizontal = "prefix+minus"
focus_pane_left = "prefix+ctrl+h"
focus_pane_down = "prefix+ctrl+j"
focus_pane_up = "prefix+ctrl+k"
focus_pane_right = "prefix+ctrl+l"
swap_pane_down = "alt+["
swap_pane_up = "alt+]"
reload_config = "prefix+r"

# Restore Herdr-native workspace and worktree navigation on unused keys.
goto = "prefix+f"
workspace_picker = "prefix+shift+f"
previous_workspace = "prefix+ctrl+p"
next_workspace = "prefix+ctrl+n"
new_worktree = "prefix+shift+g"
open_worktree = "prefix+shift+o"
open_notification_target = "prefix+o"

# Navigate workspaces with Vim motions while Herdr's navigator is open.
navigate_workspace_up = "k"
navigate_workspace_down = "j"

# Switch workspaces with Ctrl-Space, then Ctrl-1 through Ctrl-9. This avoids
# terminal handling of shifted digits while keeping the tmux-style prefix.
switch_workspace = "prefix+ctrl+1..9"

# Keep destructive workspace closure behind the native confirmation prompt.
close_workspace = "prefix+ctrl+x"
swap_pane_left = ""
swap_pane_right = ""

# tmux-open's URL/file picker is now Herdr-native and reads focused-pane
# scrollback through the local CLI. Keep the editor scrollback action unbound.
edit_scrollback = ""

[[keys.command]]
key = "prefix+ctrl+f"
type = "plugin_action"
command = "sessionizer.open"
description = "open project workspace"

[[keys.command]]
key = "prefix+u"
type = "pane"
command = "herdr-open"
description = "open URL or file from scrollback"

[[keys.command]]
key = "prefix+l"
type = "plugin_action"
command = "dantehemerson.last-tab.toggle"
description = "last tab"

[[keys.command]]
key = "prefix+shift+l"
type = "plugin_action"
command = "third774.last-workspace.toggle"
description = "last workspace"

[[keys.command]]
key = "prefix+ctrl+shift+p"
type = "shell"
command = "herdr-move-workspace previous"
description = "move workspace earlier"

[[keys.command]]
key = "prefix+ctrl+shift+n"
type = "shell"
command = "herdr-move-workspace next"
description = "move workspace later"

[[keys.command]]
key = "prefix+ctrl+shift+1"
type = "shell"
command = "herdr-move-workspace position 1"
description = "move workspace to position 1"

[[keys.command]]
key = "prefix+ctrl+shift+2"
type = "shell"
command = "herdr-move-workspace position 2"
description = "move workspace to position 2"

[[keys.command]]
key = "prefix+ctrl+shift+3"
type = "shell"
command = "herdr-move-workspace position 3"
description = "move workspace to position 3"

[[keys.command]]
key = "prefix+ctrl+shift+4"
type = "shell"
command = "herdr-move-workspace position 4"
description = "move workspace to position 4"

[[keys.command]]
key = "prefix+ctrl+shift+5"
type = "shell"
command = "herdr-move-workspace position 5"
description = "move workspace to position 5"

[[keys.command]]
key = "prefix+ctrl+shift+6"
type = "shell"
command = "herdr-move-workspace position 6"
description = "move workspace to position 6"

[[keys.command]]
key = "prefix+ctrl+shift+7"
type = "shell"
command = "herdr-move-workspace position 7"
description = "move workspace to position 7"

[[keys.command]]
key = "prefix+ctrl+shift+8"
type = "shell"
command = "herdr-move-workspace position 8"
description = "move workspace to position 8"

[[keys.command]]
key = "prefix+ctrl+shift+9"
type = "shell"
command = "herdr-move-workspace position 9"
description = "move workspace to position 9"

# Former tmux-popup commands. Herdr keeps each temporary pane alive until its
# command exits; it does not support promoting a popup into a tab.
# prefix+u restores tmux-open's URL/file picker through bin/herdr-open.
[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "lazygit"

[[keys.command]]
key = "prefix+shift+d"
type = "pane"
command = "lazydocker"
description = "lazydocker"

[[keys.command]]
key = "prefix+e"
type = "pane"
command = "ranger"
description = "ranger"

[[keys.command]]
key = "prefix+w"
type = "pane"
command = "cd ~ && exec zsh"
description = "scratch shell"

[[keys.command]]
key = "prefix+alt+s"
type = "pane"
command = "nvim ~/scratch.md"
description = "persistent scratch note"

[[keys.command]]
key = "prefix+shift+s"
type = "pane"
command = 'nvim -c "setlocal buftype=nofile bufhidden=wipe noswapfile nomodified"'
description = "ephemeral scratch note"

[[keys.command]]
key = "prefix+shift+h"
type = "pane"
command = "btop"
description = "btop"

[[keys.command]]
key = "prefix+ctrl+v"
type = "pane"
command = "sbx"
description = "sbx"

[[keys.command]]
key = "prefix+ctrl+d"
type = "pane"
command = "agent-dashboard"
description = "agent dashboard"

# Dedicated-agent shortcuts from tmux-sessionizer. Custom command bindings do
# not have a tab type, so these use Herdr's local CLI to create and focus a tab,
# then start the agent in its root pane. The former per-session window cache has
# no native Herdr equivalent.
[[keys.command]]
key = "prefix+alt+j"
type = "shell"
command = '''tab_json="$("$HERDR_BIN_PATH" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "${HERDR_ACTIVE_PANE_CWD:-$PWD}" --focus)"
"$HERDR_BIN_PATH" pane run "$(printf '%s' "$tab_json" | jq -er '.result.root_pane.pane_id')" "claude"'''
description = "Claude"

[[keys.command]]
key = "prefix+alt+k"
type = "shell"
command = '''tab_json="$("$HERDR_BIN_PATH" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "${HERDR_ACTIVE_PANE_CWD:-$PWD}" --focus)"
"$HERDR_BIN_PATH" pane run "$(printf '%s' "$tab_json" | jq -er '.result.root_pane.pane_id')" "codex --yolo"'''
description = "Codex"

[[keys.command]]
key = "prefix+alt+l"
type = "shell"
command = '''tab_json="$("$HERDR_BIN_PATH" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "${HERDR_ACTIVE_PANE_CWD:-$PWD}" --focus)"
"$HERDR_BIN_PATH" pane run "$(printf '%s' "$tab_json" | jq -er '.result.root_pane.pane_id')" "pi"'''
description = "Pi"

[[keys.command]]
key = "prefix+alt+semicolon"
type = "shell"
command = '''tab_json="$("$HERDR_BIN_PATH" tab create --workspace "$HERDR_ACTIVE_WORKSPACE_ID" --cwd "${HERDR_ACTIVE_PANE_CWD:-$PWD}" --focus)"
"$HERDR_BIN_PATH" pane run "$(printf '%s' "$tab_json" | jq -er '.result.root_pane.pane_id')" "agent"'''
description = "agent"

[ui]
mouse_capture = true
confirm_close = true
pane_borders = true
# tmux uses shared pane dividers rather than visual gaps.
pane_gaps = false
hide_tab_bar_when_single_tab = false
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"

[ui.toast]
# Surface background agent attention without a bell-like sound.
delivery = "system"
delay_seconds = 10

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[advanced]
# Herdr uses bytes rather than tmux's line count; 10 MiB is its safe default.
scrollback_limit_bytes = 10000000
