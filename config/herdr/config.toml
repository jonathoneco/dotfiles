# Herdr configuration — tmux migration
#
# Herdr manages project work as workspaces containing tabs and panes.  It has
# no programmable tmux status line or window reordering, so those behaviours
# deliberately remain exclusive to the tmux configuration.

onboarding = false

[theme]
# config/tmux/config/plugins.conf uses Rose Pine's main variant.
name = "rose-pine"

[terminal]
default_shell = "zsh"
new_cwd = "follow"

[keys]
# Keep the active tmux prefix, Ctrl-Space (not the stale Ctrl-A comment).
prefix = "ctrl+space"

# Windows become Herdr tabs; pane and copy-mode bindings retain the tmux map.
new_tab = "prefix+c"
rename_tab = "prefix+ctrl+r"
copy_mode = "prefix+v"
split_vertical = "prefix+backslash"
split_horizontal = "prefix+minus"
focus_pane_left = "prefix+ctrl+h"
focus_pane_down = "prefix+ctrl+j"
focus_pane_up = "prefix+ctrl+k"
focus_pane_right = "prefix+ctrl+l"
swap_pane_down = "alt+["
swap_pane_up = "alt+]"
reload_config = "prefix+r"

# Restore Herdr-native workspace and worktree navigation on unused keys.
goto = "prefix+f"
workspace_picker = "prefix+shift+f"
previous_workspace = "prefix+shift+left"
next_workspace = "prefix+shift+right"
switch_workspace = "prefix+shift+1..9"
new_worktree = "prefix+shift+g"
open_worktree = "prefix+shift+o"
open_notification_target = "prefix+o"

# Navigate workspaces with Vim motions while Herdr's navigator is open.
navigate_workspace_up = "k"
navigate_workspace_down = "j"

# These built-ins conflict with retained tmux shortcut assignments below.
close_workspace = ""
swap_pane_left = ""

# Preserve focused-pane output in the configured editor.
edit_scrollback = "prefix+u"

[[keys.command]]
key = "prefix+ctrl+s"
type = "plugin_action"
command = "sessionizer.open"
description = "open project workspace"

# Former tmux-popup commands. Herdr keeps each temporary pane alive until its
# command exits; it does not support promoting a popup into a tab.
# Herdr uses prefix+u for editor scrollback. tmux-open's URL/file picker has
# no direct equivalent; use Herdr's native Ctrl-click link opener or the
# terminal's normal URL/file handling instead.
[[keys.command]]
key = "prefix+g"
type = "pane"
command = "lazygit"
description = "lazygit"

[[keys.command]]
key = "prefix+shift+d"
type = "pane"
command = "lazydocker"
description = "lazydocker"

[[keys.command]]
key = "prefix+e"
type = "pane"
command = "ranger"
description = "ranger"

[[keys.command]]
key = "prefix+w"
type = "pane"
command = "cd ~ && exec zsh"
description = "scratch shell"

[[keys.command]]
key = "prefix+alt+s"
type = "pane"
command = "nvim ~/scratch.md"
description = "persistent scratch note"

[[keys.command]]
key = "prefix+shift+s"
type = "pane"
command = 'nvim -c "setlocal buftype=nofile bufhidden=wipe noswapfile nomodified"'
description = "ephemeral scratch note"

[[keys.command]]
key = "prefix+shift+h"
type = "pane"
command = "btop"
description = "btop"

[[keys.command]]
key = "prefix+ctrl+v"
type = "pane"
command = "sbx"
description = "sbx"

[[keys.command]]
key = "prefix+ctrl+f"
type = "pane"
command = "agent-dashboard"
description = "agent dashboard"

# Dedicated-agent shortcuts from tmux-sessionizer. These now open a new Herdr
# pane on every invocation instead of focusing cached tmux windows. The process
# remains alive until it exits, but the former per-session window cache has no
# native Herdr equivalent.
[[keys.command]]
key = "prefix+alt+j"
type = "pane"
command = "claude"
description = "Claude"

[[keys.command]]
key = "prefix+alt+k"
type = "pane"
command = "codex --yolo"
description = "Codex"

[[keys.command]]
key = "prefix+alt+l"
type = "pane"
command = "pi"
description = "Pi"

[[keys.command]]
key = "prefix+alt+semicolon"
type = "pane"
command = "agent"
description = "agent"

[ui]
mouse_capture = true
pane_borders = true
# tmux uses shared pane dividers rather than visual gaps.
pane_gaps = false
hide_tab_bar_when_single_tab = false
prompt_new_tab_name = false
show_agent_labels_on_pane_borders = true
agent_panel_sort = "priority"

[ui.toast]
# Surface background agent attention without a bell-like sound.
delivery = "system"
delay_seconds = 10

[ui.sound]
enabled = false

[session]
resume_agents_on_restore = true

[advanced]
# Herdr uses bytes rather than tmux's line count; 10 MiB is its safe default.
scrollback_limit_bytes = 10000000
